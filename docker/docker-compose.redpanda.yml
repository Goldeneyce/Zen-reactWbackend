services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --memory 256M
      - --reserve-memory 0M
      - --default-log-level=warn
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    ports:
      - "19092:19092" # External Kafka API (host access / debugging)
      - "18082:18082" # External Pandaproxy REST API (optional)
      - "18081:18081" # External Schema Registry (optional)
    # Internal port 9092 is accessible to other containers on the same Docker network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rpk cluster health --api-urls internal://localhost:9092 | grep -q 'Healthy.*true'",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redpanda-data:
    driver: local
